<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#ffffff">
    <title>Xurxo Castro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="portfolio.css">
    <script src="../portfolio.js?v=8" defer></script>
  </head>
  <body>

    <aside class="pf-sidebar">
      <div class="pf-sidebar-top">
        <p class="pf-name">Xurxo Castro</p>
        <p class="pf-tagline">Trying to find what<br>makes a photo good.</p>
      </div>
      <nav class="pf-nav">
        <a href="https://www.instagram.com/xurxo.jpg/" target="_blank" rel="noopener noreferrer">Instagram</a>

    </aside>

    <main class="pf-main" id="portfolioGridPhotos">

      <figure class="portfolio-photo">
        <picture>
          <source srcset="../images/w/DSCF1147.webp" type="image/webp">
          <img src="../images/DSCF1147.jpg" alt="" fetchpriority="high" decoding="async">
        </picture>
      </figure>

      <figure class="portfolio-photo">

      <figure class="portfolio-photo">

    </main>

    <!-- Lightbox -->
    <div class="lightbox hidden" id="lightbox" role="dialog" aria-modal="true" aria-label="Vista ampliada">
      <button type="button" class="lightbox-close" id="lightboxClose" aria-label="Cerrar">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
        </svg>
      </button>
      <button type="button" class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Anterior">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 18-6-6 6-6"/>
        </svg>
      </button>
      <img class="lightbox-image" id="lightboxImage" alt="">
      <button type="button" class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Siguiente">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="m9 18 6-6-6-6"/>
        </svg>
      </button>
    </div>
