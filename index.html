<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#202124">
    <title>Xurxo's Portfolio</title>
    <link rel="stylesheet" href="styles.css?v=6">
    <script src="portfolio.js?v=6" defer></script>
  </head>
  <body>
    <section class="portfolio-screen" id="portfolioScreen" aria-labelledby="portfolioTitle">
      <header class="portfolio-header">
        <h1 id="portfolioTitle">Xurxo's Portfolio</h1>
        <p class="portfolio-subtitle">Trying to find what makes a photo good.</p>
      </header>

      <div class="portfolio-grid-photos" id="portfolioGridPhotos">
        <figure class="portfolio-photo">
          <img src="images/DSCF1147.jpg" alt="" loading="lazy">
        </figure>
        <figure class="portfolio-photo">
          <img src="images/DSCF2141.jpg" alt="" loading="lazy">
        </figure>
        <figure class="portfolio-photo">
          <img src="images/DSCF3364~3.jpg" alt="" loading="lazy">
        </figure>
        <figure class="portfolio-photo">
          <img src="images/DSCF3710~2.jpg" alt="" loading="lazy">
        </figure>
        <figure class="portfolio-photo">
          <img src="images/DSCF5009.jpg" alt="" loading="lazy">
        </figure>
        <figure class="portfolio-photo">
          <img src="images/DSCF5097.jpg" alt="" loading="lazy">
        </figure>
        <figure class="portfolio-photo">
          <img src="images/DSCF5353.jpg" alt="" loading="lazy">
        </figure>
        <figure class="portfolio-photo">
          <img src="images/DSCF5619.JPG" alt="" loading="lazy">
        </figure>
        <figure class="portfolio-photo">
          <img src="images/DSCF6095.jpg" alt="" loading="lazy">
        </figure>
        <figure class="portfolio-photo">
          <img src="images/IMG_20251229_174110_159.webp" alt="" loading="lazy">
        </figure>
        <figure class="portfolio-photo">
          <img src="images/PXL_20250413_102444731.jpg" alt="" loading="lazy">
        </figure>
        <figure class="portfolio-photo">
          <img src="images/PXL_20250613_101738166.jpg" alt="" loading="lazy">
        </figure>
      </div>

      <footer class="portfolio-footer">
        <a class="portfolio-social" href="https://www.instagram.com/xurxo.jpg/" target="_blank" rel="noopener noreferrer" aria-label="Instagram @xurxo.jpg">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="5" ry="5"></rect>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
          </svg>
          <span>@xurxo.jpg</span>
        </a>
      </footer>
    </section>

    <div class="lightbox hidden" id="lightbox" role="dialog" aria-modal="true" aria-label="Vista ampliada">
      <button type="button" class="lightbox-close" id="lightboxClose" aria-label="Cerrar">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18"></path>
          <path d="m6 6 12 12"></path>
        </svg>
      </button>
      <button type="button" class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Anterior">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 18-6-6 6-6"></path>
        </svg>
      </button>
      <img class="lightbox-image" id="lightboxImage" alt="">
      <button type="button" class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Siguiente">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m9 18 6-6-6-6"></path>
        </svg>
      </button>
    </div>
  </body>
</html>
